name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    env:
      SOLUTION_FILE_PATH: src/Shell.sln
      BUILD_CONFIGURATION: release
      BUILD_PLATFORM: x64
      BIN_PATH: ${{ github.workspace }}\src\bin
      PORTABLE_DIR: ${{ github.workspace }}\artifacts\shell-portable-x64
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build portable targets
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m "/target:dll;exe" /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{env.BUILD_PLATFORM}} ${{env.SOLUTION_FILE_PATH}}

    - name: Stage portable files
      shell: powershell
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        $out = "${{ env.PORTABLE_DIR }}"
        if (Test-Path $out) { Remove-Item -Recurse -Force $out }
        New-Item -ItemType Directory -Path $out | Out-Null
        Copy-Item "${{ env.BIN_PATH }}\shell.exe" $out
        Copy-Item "${{ env.BIN_PATH }}\shell.dll" $out
        Copy-Item "${{ env.BIN_PATH }}\shell.nss" $out
        Copy-Item "${{ env.BIN_PATH }}\readme.txt" $out
        Copy-Item "${{ env.BIN_PATH }}\license.txt" $out
        Copy-Item "${{ env.BIN_PATH }}\imports" -Destination $out -Recurse

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: shell-portable-x64
        path: ${{ env.PORTABLE_DIR }}
        if-no-files-found: error
        retention-days: 7
        compression-level: 6
        overwrite: false
        include-hidden-files: false
